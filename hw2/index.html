<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт мини-игры</title>
</head>

<body>

    <header class="welcome-section">
        <div class="welcome-section__container">
            <div class="welcome-section__content">
                <h1 class="welcome-section__title">Добро пожаловать на мой сайт мини-игр</h1>
                <p class="welcome-section__text">Тебе предстоит пройти несколько увлекательных игр. Если готов, нажимай
                    «Поехали!» и приступай.</p>
                <div class="welcome-section__buttons">
                    <a href="#games" class="welcome-section__button welcome-section__button_primary">Поехали</a>

                </div>

            </div>

        </div>

    </header>
    <!--Блок "Об играх"-->
    <main class="about-games-section" id="about">
        <div class="about-games-section__container">
            <h2 class="about-games-section__title">Об играх</h2>
            <div class="games-grid">
                <a href="#game-link-1" class="game-card">
                    <div class="game-card__image-wrapper">
                        <img src="img/guess.png" alt="Угадай число" class="game-card__image">

                    </div>
                    <div class="game-card__content">
                        <h3 class="game-card__title">Угадай число</h3>


                    </div>
                </a>
                <a href="#game-link-2" class="game-card">
                    <div class="game-card__image-wrapper">
                        <img src="img/guess.png" alt="Простая арифметика" class="game-card__image">

                    </div>
                    <div class="game-card__content">
                        <h3 class="game-card__title">Простая арифметика</h3>


                    </div>
                </a>
                <a href="#game-link-3" class="game-card">
                    <div class="game-card__image-wrapper">
                        <img src="img/guess.png" alt="Переверни текст" class="game-card__image">

                    </div>
                    <div class="game-card__content">
                        <h3 class="game-card__title">Переверни текст</h3>


                    </div>
                </a>
                <a href="#game-link-4" class="game-card">
                    <div class="game-card__image-wrapper">
                        <img src="img/guess.png" alt="Камень, ножницы, бумага" class="game-card__image">

                    </div>
                    <div class="game-card__content">
                        <h3 class="game-card__title">Камень, ножницы, бумага</h3>


                    </div>
                </a>
                <a href="#game-link-5" class="game-card">
                    <div class="game-card__image-wrapper">
                        <img src="img/guess.png" alt="Простая викторина" class="game-card__image">

                    </div>
                    <div class="game-card__content">
                        <h3 class="game-card__title">Простая викторина</h3>


                    </div>
                </a>
                <a href="#game-link-6" class="game-card">
                    <div class="game-card__image-wrapper">
                        <img src="img/guess.png" alt="Генератор случайных цветов" class="game-card__image">

                    </div>
                    <div class="game-card__content">
                        <h3 class="game-card__title">Генератор случайных цветов</h3>


                    </div>
                </a>

            </div>

        </div>

    </main>

</body>

</html>
